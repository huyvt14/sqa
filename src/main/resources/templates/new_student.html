<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Quản lý sinh viên</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
</head>
<body>
	<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <!-- Brand -->
  <a class="navbar-brand" href="#">Quản lý sinh viên</a>

  <!-- Toggler/collapsibe Button -->
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Navbar links -->
  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/list}">Quản lý sinh viên</a>
      </li>
    </ul>
  </div>
</nav>
<br>
<br>
    <div class="container">
  <div class="row">
      <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
          <h1 class="text-center"> Tạo mới sinh viên </h1>
          <div class="card-body">
		<form th:action="@{/save}" method="post" th:object="${sinhVienKhoa}">
		        <div class="form-group">
                    <label for="taiKhoan">Tên đăng nhập:</label>
                    <input type="text" class="form-control" id="taiKhoan" name="taiKhoan" th:field="*{sinhVien.username}" required>
                </div>
                <div class="form-group">
                    <label for="matKhau">Mật Khẩu</label>
                    <input type="password" class="form-control" id="matKhau" name="matKhau" th:field="*{sinhVien.password}" required>
                </div>
          
          <div class="form-group">
              <label for="hoTen">Họ và tên:</label>
              <input type="text" class="form-control" id="hoTen" name="hoTen" th:field="*{sinhVien.hoTen}" required>
          </div>
          <div class="form-group">
              <label for="soDienThoai">Số điện thoại:</label>
              <input type="text" class="form-control" id="soDienThoai" name="soDienThoai" th:field="*{sinhVien.soDienThoai}">
          </div>
          <div class="form-group">
              <label for="diaChi">Địa chỉ:</label>
              <input type="text" class="form-control" id="diaChi" name="diaChi" th:field="*{sinhVien.diaChi}">
          </div>
          <div class="form-group">
              <label for="ghiChu">Ghi chú:</label>
              <input type="text" class="form-control" id="ghiChu" name="ghiChu" th:field="*{sinhVien.ghiChu}">
          </div>
          <div class="form-group">
              <label for="ngaySinh">Ngày sinh:</label>
              <input type="date" class="form-control" id="ngaySinh" name="ngaySinh" th:field="*{sinhVien.ngaySinh}">
          </div>
 
          <div class="form-group">
              <label for="maSv">Mã sinh viên:</label>
              <input type="text" class="form-control" id="maSv" name="maSv" th:field="*{sinhVien.maSV}">
          </div>

          <div class="form-group">
              <label for="khoas">Khoa:</label>
              <select id="khoas" name="khoas" multiple class="form-control" th:field="*{khoa}">
                  <option th:each="khoa : ${khoas}" th:value="${khoa.id}" th:text="${khoa.ten}"></option>
              </select>
 
            <button type="submit">Thêm sinh viên</button>
              
		       
		      </form>
          </div>
      </div>
  </div>
</div>
</body>
</html>
