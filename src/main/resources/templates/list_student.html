<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="ISO-8859-1">
<title>Quản lý sinh viên</title>
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <!-- Brand -->
  <a class="navbar-brand" href="#">Quản lý sinh viên</a>

  <!-- Toggler/collapsibe Button -->
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Navbar links -->
  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/add}">Quản lý sinh viên</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" th:href="@{/students}">Quản lý giảng viên</a>
      </li>
    </ul>
  </div>
</nav>

	<div class ="container">
		<div class = "row">
			<h1> Danh sách sinh vien </h1>
		</div>
		
		<div class = "row">
			<div class = "col-lg-3">
				<a th:href = "@{/add}" class = "btn btn-primary btn-sm mb-3">Thêm mới</a>
			</div>
		</div>
		 <table class = "table table-striped table-bordered">
			<thead class = "table-dark">
                <tr>
                    <th>Tài Khoản</th>
                    <th>Mật Khẩu</th>
                    <th>Họ Tên</th>
                    <th>Số Điện Thoại</th>
                    <th>Địa Chỉ</th>
                    <th>Ghi Chú</th>
                    <th>Ngày Sinh</th>
                    <th>Mã SV</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
               
                <tr th:each="sinhVien : ${sinhViens}">
                    <td th:text="${sinhVien.username}"></td>
                    <td th:text="${sinhVien.password}"></td>
                    <td th:text="${sinhVien.hoTen}"></td>
                    <td th:text="${sinhVien.soDienThoai}"></td>
                    <td th:text="${sinhVien.diaChi}"></td>
                    <td th:text="${sinhVien.ghiChu}"></td>
                    <td th:text="${#dates.format(sinhVien.ngaySinh, 'dd/MM/yyyy')}"></td>
                    <td th:text="${sinhVien.maSV}"></td>
                    <td>
                        <!-- Các nút cho việc chỉnh sửa và xóa -->
                        <a th:href="@{/edit/{id}(id=${sinhVien.id})}" class="btn btn-primary btn-sm">Sửa</a>
                        <a th:href="@{/delete/{id}(id=${sinhVien.id})}" class="btn btn-danger btn-sm">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>

	</div>
</body>
</html>
